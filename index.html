<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReplayChart Pro</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *{box-sizing:border-box}html,body,#root{height:100%;margin:0;background:#0b111d;color:#dbe6ff;font-family:Arial,system-ui,sans-serif;overflow:hidden}button,select,input{background:#172036;color:#dbe6ff;border:1px solid #2b3754;border-radius:8px;padding:8px 10px}button{cursor:pointer}.primary{background:#2962ff;border-color:#5b7cff;color:#fff}.pre{height:100%;display:grid;place-items:center;padding:18px}.card{width:min(430px,94vw);background:#10182b;border:1px solid #28334e;border-radius:18px;padding:20px;display:grid;gap:13px;box-shadow:0 28px 70px #0008}.card h1{margin:0}.card p{margin:0;color:#94a3b8}.card label{display:grid;gap:6px;font-size:14px}.wide{height:42px;font-weight:700}.app{height:100%;display:grid;grid-template-rows:46px 1fr 56px}.top{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid #27324d;background:#101827;overflow-x:auto}.brand{font-weight:800;white-space:nowrap}.tfs{display:flex;gap:5px;direction:ltr}.tfs button.active{border-color:#4da3ff;background:#213252}.spacer{flex:1}.main{display:grid;grid-template-columns:58px 1fr 280px;min-height:0}.tools{border-left:1px solid #27324d;background:#101827;display:grid;align-content:start;gap:5px;padding:6px}.tools button{height:38px;padding:0;font-size:13px}.tools button.active{border-color:#4da3ff;background:#213252}.chartbox{position:relative;min-width:0;background:#0f1420}.chart{position:absolute;inset:0}.draw{position:absolute;inset:0;z-index:5}.water{position:absolute;left:60px;top:55px;font-size:56px;font-weight:900;color:#ffffff10;z-index:1;pointer-events:none;direction:ltr}.ohlc{position:absolute;left:12px;top:10px;z-index:6;background:#0f1420cc;border:1px solid #27324d;border-radius:8px;padding:6px 9px;direction:ltr;font-size:13px}.side{border-right:1px solid #27324d;background:#101827;overflow:auto;padding:8px;display:grid;align-content:start;gap:10px}.panel{border:1px solid #2b3857;border-radius:10px;padding:9px;display:grid;gap:8px}.panel h3{margin:0;font-size:14px}.obj{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;padding:6px;border-radius:7px;background:#172036}.rep{display:flex;gap:8px;align-items:center;padding:8px;border-top:1px solid #27324d;background:#101827;direction:ltr}.rep input{flex:1}.status{font-size:13px;color:#94a3b8}.err{color:#ff8080}@media(max-width:900px){.app{grid-template-rows:46px 1fr 58px}.main{grid-template-columns:1fr}.tools,.side{display:none}.rep{overflow:auto}.water{font-size:34px;left:22px}.top{font-size:12px}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  const root=document.getElementById('root');
  const TF=['1m','3m','5m','15m','30m','1H','2H','4H','1D'];
  const TOOLS=[['cursor','⌖'],['trend','╱'],['ray','➝'],['hline','─'],['rect','▭'],['fib','F'],['long','L'],['short','S'],['text','T']];
  let chart=null,series=null,candles1m=[],full=[],tf='5m',symbol='BTCUSDT',replay=0,timer=null,tool='cursor',draft=[],drawings=[],canvas=null,ctx=null;
  function screenLoad(){root.innerHTML=`<section class="pre"><div class="card"><h1>ReplayChart Pro</h1><p>منصة تحليل يدوي + Replay بدون مؤشرات.</p><label>السوق<select id="m"><option>BTCUSDT</option><option>ETHUSDT</option><option>SOLUSDT</option><option>BNBUSDT</option></select></label><label>تاريخ بداية الريبلاي<input id="d" type="datetime-local"></label><label>عمق البيانات<select id="depth"><option value="3">3 أيام قبل + بعد</option><option value="7" selected>7 أيام قبل + بعد</option><option value="14">14 يوم قبل + بعد</option></select></label><button id="load" class="primary wide">تحميل الشارت</button><div id="st" class="status">جاهز</div></div></section>`;document.getElementById('d').value=new Date(Date.now()-864e5*2).toISOString().slice(0,16);document.getElementById('load').onclick=loadData;}
  async function loadData(){symbol=document.getElementById('m').value;const start=new Date(document.getElementById('d').value).getTime();const days=+document.getElementById('depth').value;document.getElementById('st').textContent='تحميل البيانات...';try{candles1m=await binance(symbol,start-days*864e5,start+days*864e5)}catch(e){candles1m=synth(start-days*864e5,start+days*864e5,symbol==='BTCUSDT'?60000:2500);document.getElementById('st').innerHTML='<span class="err">فشل Binance، تم استعمال بيانات تجريبية.</span>'}openApp(Math.floor(start/1000))}
  async function binance(sym,from,to){let out=[],cur=from;while(cur<=to){const u=`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1m&limit=1000&startTime=${Math.floor(cur)}&endTime=${Math.floor(to)}`;const r=await fetch(u);if(!r.ok)throw Error(r.status);const raw=await r.json();if(!raw.length)break;out.push(...raw.map(x=>({time:Math.floor(x[0]/1000),open:+x[1],high:+x[2],low:+x[3],close:+x[4],volume:+x[5]})));cur=raw[raw.length-1][0]+60000;if(out.length>25000)break}if(!out.length)throw Error('empty');return out}
  function synth(from,to,seed){let a=[],last=seed;for(let t=from;t<=to;t+=60000){let o=last,c=Math.max(1,o+Math.sin(a.length/25)*8+(Math.random()-.5)*60),h=Math.max(o,c)+Math.random()*25,l=Math.min(o,c)-Math.random()*25;last=c;a.push({time:Math.floor(t/1000),open:o,high:h,low:l,close:c,volume:Math.random()*100})}return a}
  function mins(v){let m=String(v).match(/^(\d+)(m|H|D)$/i);return m?+m[1]*(m[2].toLowerCase()==='m'?1:m[2].toLowerCase()==='h'?60:1440):1}
  function agg(data,frame){let n=mins(frame);if(n===1)return data;let map=new Map(),sec=n*60;data.forEach(c=>{let k=Math.floor(c.time/sec)*sec;if(!map.has(k))map.set(k,[]);map.get(k).push(c)});return [...map.entries()].sort((a,b)=>a[0]-b[0]).map(([time,g])=>({time,open:g[0].open,high:Math.max(...g.map(x=>x.high)),low:Math.min(...g.map(x=>x.low)),close:g[g.length-1].close,volume:g.reduce((s,x)=>s+x.volume,0)}))}
  function openApp(startSec){root.innerHTML=`<main class="app"><header class="top"><div class="brand">ReplayChart Pro</div><strong>${symbol}</strong><div id="tfs" class="tfs"></div><div class="spacer"></div><button onclick="location.reload()">تحميل جديد</button></header><section class="main"><aside id="tools" class="tools"></aside><section class="chartbox"><div id="chart" class="chart"></div><canvas id="draw" class="draw"></canvas><div class="water">${symbol}</div><div id="ohlc" class="ohlc">${symbol} ${tf}</div></section><aside class="side"><div class="panel"><h3>Object Tree</h3><div id="tree">لا توجد رسومات</div></div><div class="panel"><h3>تعليمات</h3><div class="status">اختر أداة ثم اضغط على الشارت. هذه نسخة تشغيل مباشرة على GitHub Pages.</div></div></aside></section><footer class="rep"><button id="start">|◀</button><button id="back">◀</button><button id="play" class="primary">▶</button><button id="step">▶|</button><input id="range" type="range"><span id="count">0/0</span></footer></main>`;
    document.getElementById('tfs').innerHTML=TF.map(x=>`<button class="${x===tf?'active':''}" data-tf="${x}">${x}</button>`).join('');document.getElementById('tfs').onclick=e=>{if(e.target.dataset.tf){tf=e.target.dataset.tf;refresh(startSec,true)}};
    document.getElementById('tools').innerHTML=TOOLS.map(x=>`<button title="${x[0]}" data-tool="${x[0]}" class="${x[0]===tool?'active':''}">${x[1]}</button>`).join('');document.getElementById('tools').onclick=e=>{if(e.target.dataset.tool){tool=e.target.dataset.tool;document.querySelectorAll('.tools button').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));draft=[]}};
    canvas=document.getElementById('draw');ctx=canvas.getContext('2d');chart=LightweightCharts.createChart(document.getElementById('chart'),{autoSize:true,layout:{background:{type:'solid',color:'#0f1420'},textColor:'#d5def0'},grid:{vertLines:{color:'#20273a'},horzLines:{color:'#20273a'}},crosshair:{mode:0}});series=chart.addCandlestickSeries({upColor:'#22ab94',downColor:'#f23645',wickUpColor:'#22ab94',wickDownColor:'#f23645',borderVisible:false});chart.timeScale().subscribeVisibleTimeRangeChange(draw);wire();refresh(startSec,true)}
  function refresh(startSec,reset){full=agg(candles1m,tf);if(reset){replay=full.findIndex(c=>c.time>=startSec);if(replay<0)replay=Math.floor(full.length*.4)}replay=Math.max(0,Math.min(full.length-1,replay));series.setData(full.slice(0,replay+1));document.getElementById('range').max=Math.max(0,full.length-1);document.getElementById('range').value=replay;document.getElementById('count').textContent=`${replay+1}/${full.length}`;document.getElementById('ohlc').textContent=`${symbol} ${tf}`;document.querySelectorAll('#tfs button').forEach(b=>b.classList.toggle('active',b.dataset.tf===tf));setTimeout(draw,0)}
  function wire(){document.getElementById('range').oninput=e=>{replay=+e.target.value;refresh(0,false)};document.getElementById('step').onclick=()=>step(1);document.getElementById('back').onclick=()=>step(-1);document.getElementById('start').onclick=()=>{replay=0;refresh(0,false)};document.getElementById('play').onclick=()=>{if(timer){clearInterval(timer);timer=null;return}timer=setInterval(()=>step(1),250)};canvas.onmousedown=onClick;window.onresize=draw}
  function step(n){replay+=n;refresh(0,false)}
  function xyToPoint(x,y){let time=chart.timeScale().coordinateToTime(x),price=series.coordinateToPrice(y);return time&&price?{time:typeof time==='number'?time:Math.floor(new Date(time).getTime()/1000),price}:null}
  function pxy(p){let x=chart.timeScale().timeToCoordinate(p.time),y=series.priceToCoordinate(p.price);return x==null||y==null?null:[x,y]}
  function onClick(e){if(tool==='cursor')return;let r=canvas.getBoundingClientRect(),p=xyToPoint(e.clientX-r.left,e.clientY-r.top);if(!p)return;let need=tool==='fib'||tool==='rect'||tool==='trend'||tool==='ray'||tool==='long'||tool==='short'?2:1;draft.push(p);if(draft.length>=need){drawings.push({id:Date.now(),tool,points:draft.slice()});draft=[];tree()}draw()}
  function draw(){if(!canvas||!ctx)return;canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#4da3ff';ctx.fillStyle='#4da3ff';ctx.lineWidth=2;[...drawings,{tool,points:draft}].forEach(d=>{if(!d.points||!d.points.length)return;let pts=d.points.map(pxy).filter(Boolean);if(!pts.length)return;ctx.beginPath();if(d.tool==='hline'){ctx.moveTo(0,pts[0][1]);ctx.lineTo(canvas.width,pts[0][1]);ctx.stroke();return}if((d.tool==='rect'||d.tool==='long'||d.tool==='short')&&pts[1]){let x=Math.min(pts[0][0],pts[1][0]),y=Math.min(pts[0][1],pts[1][1]),w=Math.abs(pts[0][0]-pts[1][0]),h=Math.abs(pts[0][1]-pts[1][1]);ctx.globalAlpha=.18;ctx.fillRect(x,y,w,h);ctx.globalAlpha=1;ctx.strokeRect(x,y,w,h);ctx.fillText(d.tool.toUpperCase(),x+8,y+16);return}if(d.tool==='fib'&&pts[1]){[0,.236,.382,.5,.618,.786,1].forEach(l=>{let y=pts[0][1]+(pts[1][1]-pts[0][1])*l;ctx.moveTo(Math.min(pts[0][0],pts[1][0]),y);ctx.lineTo(Math.max(pts[0][0],pts[1][0]),y);ctx.fillText(String(l),Math.max(pts[0][0],pts[1][0])+6,y)});ctx.stroke();return}ctx.moveTo(pts[0][0],pts[0][1]);if(pts[1])ctx.lineTo(pts[1][0],pts[1][1]);else ctx.arc(pts[0][0],pts[0][1],4,0,7);ctx.stroke()})}
  function tree(){let t=document.getElementById('tree');if(t)t.innerHTML=drawings.length?drawings.map((d,i)=>`<div class="obj"><span>${i+1}. ${d.tool}</span><button>•</button></div>`).join(''):'لا توجد رسومات'}
  if(!window.LightweightCharts){root.innerHTML='<section class="pre"><div class="card"><h1>ReplayChart Pro</h1><p class="err">فشل تحميل مكتبة الشارت. جرّب تحديث الصفحة أو فتحها بمتصفح آخر.</p></div></section>';return}screenLoad();
})();
</script>
</body>
</html>
